<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 512 512">
  <!-- Shattered Veil PWA icon (Prompt 82, Phase 8.3): summon-circle motif,
       matching the gacha ceremony's charge-up ring + GRAPHICS-SESSION-HANDOFF.md's
       core palette (dark navy background, gold rune accents). Pure SVG, no
       raster assets/generation pipeline needed. -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="70%">
      <stop offset="0%" stop-color="#1a2440"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff3c4"/>
      <stop offset="55%" stop-color="#e2b714"/>
      <stop offset="100%" stop-color="#a67d0a"/>
    </radialGradient>
  </defs>

  <rect width="192" height="192" rx="36" fill="url(#bg)"/>

  <!-- Outer summon ring -->
  <circle cx="256" cy="256" r="188" fill="none" stroke="#e2b714" stroke-width="6" opacity="0.85"/>
  <!-- Inner summon ring -->
  <circle cx="256" cy="256" r="150" fill="none" stroke="#e2b714" stroke-width="3" opacity="0.55"/>

  <!-- Rune ticks around the outer ring (12, evenly spaced) -->
  <g stroke="#e2b714" stroke-width="5" stroke-linecap="round" opacity="0.9">
    <line x1="256" y1="52" x2="256" y2="84"/>
    <line x1="415" y1="97" x2="397" y2="123"/>
    <line x1="460" y1="256" x2="428" y2="256"/>
    <line x1="415" y1="415" x2="397" y2="389"/>
    <line x1="256" y1="460" x2="256" y2="428"/>
    <line x1="97" y1="415" x2="115" y2="389"/>
    <line x1="52" y1="256" x2="84" y2="256"/>
    <line x1="97" y1="97" x2="115" y2="123"/>
  </g>

  <!-- Six-point star lattice (element wheel motif) -->
  <g fill="none" stroke="#e2b714" stroke-width="4" opacity="0.65">
    <polygon points="256,120 361,318 151,318"/>
    <polygon points="256,392 151,194 361,194"/>
  </g>

  <!-- Glowing core -->
  <circle cx="256" cy="256" r="66" fill="url(#core)"/>
  <circle cx="256" cy="256" r="66" fill="none" stroke="#fff8e0" stroke-width="3" opacity="0.8"/>
</svg>
